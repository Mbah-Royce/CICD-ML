name: Continous Deployment
on:
  workflow_run: 
    workflows: ["Continous Integration"]
    types: 
      - completed
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deployment To Hugging Face
        env:
          HF: ${{ secrets.HF }}
        run: make deploy HF=$HF
